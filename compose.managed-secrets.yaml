# External secret overlay for production.
#
# These Docker secrets should be materialized by the production secret manager
# or KMS sync process before deployment. Application containers consume *_FILE
# variables so secret values stay outside the process environment.
services:
  postgres:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      APP_DB_PASSWORD_FILE: /run/secrets/app_db_password
      KEYCLOAK_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
      POSTGRES_PASSWORD: !reset null
      APP_DB_PASSWORD: !reset null
      KEYCLOAK_DB_PASSWORD: !reset null
    secrets:
      - postgres_superuser_password
      - app_db_password
      - keycloak_db_password

  redis:
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_PASSWORD: !reset null
    secrets:
      - redis_password

  keycloak:
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ -n "$${KC_BOOTSTRAP_ADMIN_PASSWORD_FILE:-}" ]; then
          KC_BOOTSTRAP_ADMIN_PASSWORD="$$(cat "$${KC_BOOTSTRAP_ADMIN_PASSWORD_FILE}")"
          export KC_BOOTSTRAP_ADMIN_PASSWORD
        fi
        if [ -n "$${KC_DB_PASSWORD_FILE:-}" ]; then
          KC_DB_PASSWORD="$$(cat "$${KC_DB_PASSWORD_FILE}")"
          export KC_DB_PASSWORD
        fi
        exec /opt/keycloak/bin/kc.sh "$$@"
      - keycloak
    environment:
      KC_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
      KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
      KC_DB_PASSWORD: !reset null
      KC_BOOTSTRAP_ADMIN_PASSWORD: !reset null
    secrets:
      - keycloak_db_password
      - keycloak_admin_password

  nats:
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ -n "$${NATS_PASSWORD_FILE:-}" ]; then
          NATS_PASSWORD="$$(cat "$${NATS_PASSWORD_FILE}")"
          export NATS_PASSWORD
        fi
        exec nats-server -c /etc/nats/nats-server.conf --user "$$NATS_USER" --pass "$$NATS_PASSWORD"
    environment:
      NATS_PASSWORD_FILE: /run/secrets/nats_password
      NATS_PASSWORD: !reset null
    secrets:
      - nats_password

  minio:
    environment:
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_ROOT_PASSWORD: !reset null
    secrets:
      - minio_root_password

  mariadb:
    environment: !override
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
    healthcheck:
      test: ["CMD-SHELL", "mariadb -uroot -p\"$$(cat /run/secrets/mariadb_root_password)\" -N -e 'select 1' >/dev/null"]
    secrets:
      - mariadb_root_password

  phpmyadmin:
    environment:
      PMA_CONTROL_PASSWORD_FILE: /run/secrets/phpmyadmin_control_password
    secrets:
      - phpmyadmin_control_password

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SECURITY_ADMIN_PASSWORD: !reset null
    secrets:
      - grafana_admin_password

  php-apache:
    environment:
      PROJECTS_GATEWAY_SIGNING_KEYS_FILE: /run/secrets/projects_gateway_signing_keys
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      SMTP_PASSWORD: !reset null
    secrets:
      - projects_gateway_signing_keys
      - smtp_password

  backend:
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      SESSION_SECRET_FILE: /run/secrets/session_secret
      SESSION_SIGNING_KEYS_FILE: /run/secrets/session_signing_keys
      SECRET_HASH_KEYS_FILE: /run/secrets/hash_pepper_keys
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      GOOGLE_RECAPTCHA_SECRET_KEY_FILE: /run/secrets/google_recaptcha_secret_key
      CLOUDFLARE_TURNSTILE_SECRET_KEY_FILE: /run/secrets/cloudflare_turnstile_secret_key
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/secrets/google_oauth_client_secret
      DATABASE_URL: !reset null
      REDIS_PASSWORD: !reset null
      SESSION_SECRET: !reset null
      SESSION_SIGNING_KEYS: !reset null
      SECRET_HASH_KEYS: !reset null
      SMTP_PASSWORD: !reset null
      GOOGLE_RECAPTCHA_SECRET_KEY: !reset null
      CLOUDFLARE_TURNSTILE_SECRET_KEY: !reset null
      GOOGLE_OAUTH_CLIENT_SECRET: !reset null
    secrets:
      - database_url
      - redis_password
      - session_secret
      - session_signing_keys
      - hash_pepper_keys
      - smtp_password
      - google_recaptcha_secret_key
      - cloudflare_turnstile_secret_key
      - google_oauth_client_secret

  worker-jobs:
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      NATS_URL_FILE: /run/secrets/nats_url
      DATABASE_URL: !reset null
      REDIS_PASSWORD: !reset null
      NATS_URL: !reset null
    secrets:
      - database_url
      - redis_password
      - nats_url

  worker-notifications:
    environment:
      ALERTMANAGER_WEBHOOK_TOKEN_FILE: /run/secrets/alertmanager_webhook_token
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      NATS_URL_FILE: /run/secrets/nats_url
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      ALERTMANAGER_WEBHOOK_TOKEN: !reset null
      DATABASE_URL: !reset null
      REDIS_PASSWORD: !reset null
      NATS_URL: !reset null
      SMTP_PASSWORD: !reset null
    secrets:
      - alertmanager_webhook_token
      - database_url
      - redis_password
      - nats_url
      - smtp_password

  alertmanager:
    secrets:
      - alertmanager_webhook_token

secrets:
  postgres_superuser_password:
    external: true
  app_db_password:
    external: true
  keycloak_db_password:
    external: true
  redis_password:
    external: true
  keycloak_admin_password:
    external: true
  nats_password:
    external: true
  minio_root_password:
    external: true
  mariadb_root_password:
    external: true
  phpmyadmin_control_password:
    external: true
  grafana_admin_password:
    external: true
  session_secret:
    external: true
  session_signing_keys:
    external: true
  projects_gateway_signing_keys:
    external: true
  hash_pepper_keys:
    external: true
  backup_signing_keys:
    external: true
  alertmanager_webhook_token:
    external: true
  smtp_password:
    external: true
  google_recaptcha_secret_key:
    external: true
  cloudflare_turnstile_secret_key:
    external: true
  google_oauth_client_secret:
    external: true
  database_url:
    external: true
  nats_url:
    external: true
