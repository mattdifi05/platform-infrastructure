<VirtualHost *:80>
    ServerName admin.localhost.com
    ServerAlias projects.*
    DocumentRoot /var/www/html/public

    SetEnvIf X-Forwarded-Proto https HTTPS=on
    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-SSL "on"

    <Directory "/var/www/html">
        Require all denied
    </Directory>

    <Directory "/var/www/html/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:80>
    ServerName phpmyadmin.localhost.com
    ServerAlias phpmyadmin.*
    DocumentRoot /var/www/html/public

    SetEnvIf X-Forwarded-Proto https HTTPS=on
    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-SSL "on"

    <Directory "/var/www/html">
        Require all denied
    </Directory>

    ProxyPass        /  http://phpmyadmin/ nocanon
    ProxyPassReverse /  http://phpmyadmin/
</VirtualHost>

<VirtualHost *:80>
    ServerName project.localhost.com
    ServerAlias *
    UseCanonicalName Off
    VirtualDocumentRoot /var/www/projects/%1/public

    SetEnvIf X-Forwarded-Proto https HTTPS=on
    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-SSL "on"

    <Directory "/var/www/projects">
        Require all denied
    </Directory>

    <DirectoryMatch "^/var/www/projects/[^/]+/public(/.*)?$">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </DirectoryMatch>
</VirtualHost>

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/public

    <Directory "/var/www/html">
        Require all denied
    </Directory>

    Redirect 404 /
</VirtualHost>
