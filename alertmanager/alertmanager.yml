global:
  resolve_timeout: 5m

route:
  receiver: stexor-notification-worker
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: stexor-notification-worker
      matchers:
        - severity="critical"
      repeat_interval: 1h

receivers:
  - name: stexor-notification-worker
    webhook_configs:
      - url: http://worker-notifications:3000/alerts/prometheus
        send_resolved: true
        max_alerts: 20

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - service
      - instance
