services:
  backend:
    image: ${BACKEND_BUILD_IMAGE:-platform/backend:local}
    build:
      context: ${PROJECT_SOURCE_DIR:-../project}
      dockerfile: ${PROJECT_DOCKERFILE_DIR:-../platform-infrastructure/docker}/backend.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:26.3.1-alpine@sha256:a2dc166a387cc6ca1e62d0c8e265e49ca985d6e60abc9fe6e6c3d6ce8e63f606}
        PNPM_VERSION: ${PNPM_VERSION:-11.9.0}
      cache_from:
        - type=local,src=${DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/backend
      cache_to:
        - type=local,dest=${DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/backend,mode=max

  web:
    image: ${WEB_BUILD_IMAGE:-platform/web:local}
    build:
      context: ${PROJECT_SOURCE_DIR:-../project}
      dockerfile: ${PROJECT_DOCKERFILE_DIR:-../platform-infrastructure/docker}/web.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:26.3.1-alpine@sha256:a2dc166a387cc6ca1e62d0c8e265e49ca985d6e60abc9fe6e6c3d6ce8e63f606}
        PNPM_VERSION: ${PNPM_VERSION:-11.9.0}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.localhost.com}
        NEXT_PUBLIC_UI_URL: ${NEXT_PUBLIC_UI_URL:-https://ui.localhost.com}
        NEXT_PUBLIC_ACCOUNT_URL: ${NEXT_PUBLIC_ACCOUNT_URL:-https://account.localhost.com}
        NEXT_PUBLIC_BOT_PROTECTION_PROVIDER: ${NEXT_PUBLIC_BOT_PROTECTION_PROVIDER:-disabled}
        NEXT_PUBLIC_GOOGLE_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_GOOGLE_RECAPTCHA_SITE_KEY:-}
        NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY:-}
        ACCOUNT_HOST: ${ACCOUNT_HOST:-account.localhost.com}
        ACCOUNT_PUBLIC_URL: ${ACCOUNT_PUBLIC_URL:-https://account.localhost.com}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-https://account.localhost.com}
        KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.localhost.com/realms/platform}
      cache_from:
        - type=local,src=${DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/web
      cache_to:
        - type=local,dest=${DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/web,mode=max

  worker-notifications:
    image: ${WORKER_NOTIFICATIONS_BUILD_IMAGE:-platform/worker-notifications:local}
    build:
      context: ${PROJECT_SOURCE_DIR:-../project}
      dockerfile: ${PROJECT_DOCKERFILE_DIR:-../platform-infrastructure/docker}/worker.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:26.3.1-alpine@sha256:a2dc166a387cc6ca1e62d0c8e265e49ca985d6e60abc9fe6e6c3d6ce8e63f606}
        PNPM_VERSION: ${PNPM_VERSION:-11.9.0}
        WORKER_PACKAGE: ./apps/worker-notifications
      cache_from:
        - type=local,src=${DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/worker-notifications
      cache_to:
        - type=local,dest=${DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/worker-notifications,mode=max

  worker-jobs:
    image: ${WORKER_JOBS_BUILD_IMAGE:-platform/worker-jobs:local}
    build:
      context: ${PROJECT_SOURCE_DIR:-../project}
      dockerfile: ${PROJECT_DOCKERFILE_DIR:-../platform-infrastructure/docker}/worker.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:26.3.1-alpine@sha256:a2dc166a387cc6ca1e62d0c8e265e49ca985d6e60abc9fe6e6c3d6ce8e63f606}
        PNPM_VERSION: ${PNPM_VERSION:-11.9.0}
        WORKER_PACKAGE: ./apps/worker-jobs
      cache_from:
        - type=local,src=${DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/worker-jobs
      cache_to:
        - type=local,dest=${DOCKER_BUILD_CACHE_DIR:-.docker-build-cache}/worker-jobs,mode=max
