name: enterprise-infra

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v7

      - name: Check shell scripts parse
        run: |
          for file in scripts/*.sh; do
            sh -n "$file"
          done

      - name: Control Center tests
        run: sh ./scripts/infra-ops.sh control-center-tests

      - name: Project Router tests
        run: sh ./scripts/infra-ops.sh project-router-tests

  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v7

      - name: Prepare optional source placeholder
        run: |
          mkdir -p .tmp/optional-project-source
          printf 'Infrastructure CI source placeholder; project repositories are intentionally not checked out here.\n' > .tmp/optional-project-source/.infra-only

      - name: Prepare local secret files
        run: |
          mkdir -p secrets traefik/certs
          for name in postgres_superuser_password app_db_password keycloak_db_password redis_password keycloak_admin_password nats_password minio_root_password grafana_admin_password session_secret session_signing_keys projects_gateway_signing_keys hash_pepper_keys database_url nats_url smtp_password mariadb_root_password phpmyadmin_control_password google_recaptcha_secret_key cloudflare_turnstile_secret_key google_oauth_client_secret alertmanager_webhook_token backup_signing_keys restic_password; do
            printf 'ci-placeholder-%s-00000000000000000000000000000000\n' "$name" > "secrets/$name.txt"
          done
          printf 'dummy-cert\n' > traefik/certs/local-cert.pem
          printf 'dummy-key\n' > traefik/certs/local-key.pem

      - name: Render local WAF compose
        run: |
          cp .env.example .env
          printf '\nPROJECT_SOURCE_DIR=./.tmp/optional-project-source\n' >> .env
          docker network create enterprise_net || true
          docker volume create enterprise_mariadb_data || true
          docker compose --env-file .env -p platform_ops_ci \
            -f compose.yaml \
            -f compose.build.yaml \
            -f compose.secrets.yaml \
            -f compose.waf.yaml \
            config --quiet

      - name: Render VPS WAF compose
        run: |
          docker compose --env-file .env.vps.example -p platform_infra_vps_ci \
            -f compose.yaml \
            -f compose.build.yaml \
            -f compose.secrets.yaml \
            -f compose.vps.yaml \
            -f compose.waf.yaml \
            -f compose.vps-waf.yaml \
            config --quiet

      - name: Render staging and backup compose
        run: |
          docker compose --env-file .env -p platform_infra_staging_ci \
            -f compose.yaml \
            -f compose.build.yaml \
            -f compose.secrets.yaml \
            -f compose.waf.yaml \
            -f compose.staging.yaml \
            config --quiet
          docker compose --env-file .env -p platform_ops_backup_ci \
            -f compose.yaml \
            -f compose.secrets.yaml \
            -f compose.backup-scheduler.yaml \
            config --quiet

      - name: Compose healthcheck coverage
        run: sh ./scripts/infra-ops.sh compose-healthcheck-coverage

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v7

      - name: Secret scan
        run: sh ./scripts/infra-ops.sh secret-scan

      - name: Static security checks
        run: sh ./scripts/infra-ops.sh static-security-check --infraOnly

      - name: Release artifact gate dry run
        run: |
          mkdir -p .tmp/ci-sbom
          printf '%s\n' \
            'BACKEND_IMAGE=registry.example/platform/backend:ci@sha256:1111111111111111111111111111111111111111111111111111111111111111' \
            'WEB_IMAGE=registry.example/platform/web:ci@sha256:2222222222222222222222222222222222222222222222222222222222222222' \
            'WORKER_NOTIFICATIONS_IMAGE=registry.example/platform/worker-notifications:ci@sha256:3333333333333333333333333333333333333333333333333333333333333333' \
            'WORKER_JOBS_IMAGE=registry.example/platform/worker-jobs:ci@sha256:4444444444444444444444444444444444444444444444444444444444444444' \
            > .tmp/ci-release.env
          printf '%s\n' '{"bomFormat":"CycloneDX","specVersion":"1.5","components":[]}' > .tmp/ci-sbom/pnpm-sbom-ci.json
          sh ./scripts/infra-ops.sh release-artifact-gate --envFile .tmp/ci-release.env --sbom .tmp/ci-sbom/pnpm-sbom-ci.json

  enterprise-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v7

      - name: GitHub branch protection policy dry run
        run: sh ./scripts/infra-ops.sh github-branch-protection --repo "${{ github.repository }}" --branch main --dryRun

      - name: GitHub environments policy dry run
        run: sh ./scripts/infra-ops.sh github-environments --repo "${{ github.repository }}" --dryRun

      - name: GitHub Actions runtime policy dry run
        run: sh ./scripts/infra-ops.sh github-actions-config --repo "${{ github.repository }}"

      - name: Production go-no-go summary
        run: sh ./scripts/infra-ops.sh production-go-no-go

      - name: Enterprise requirements traceability
        run: sh ./scripts/infra-ops.sh enterprise-requirements-check

      - name: Production readiness checklist
        run: sh ./scripts/infra-ops.sh enterprise-requirements-check --manifest governance/production-readiness.json

      - name: Repository coverage audit
        run: sh ./scripts/infra-ops.sh repo-coverage-check

  compose-and-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v7

      - name: GitHub Actions workflow lint
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color

      - name: Prepare optional source placeholder
        run: |
          mkdir -p .tmp/optional-project-source
          printf 'Infrastructure CI source placeholder; project repositories are intentionally not checked out here.\n' > .tmp/optional-project-source/.infra-only

      - name: Prepare local secret files
        run: |
          mkdir -p secrets traefik/certs
          for name in postgres_superuser_password app_db_password keycloak_db_password redis_password keycloak_admin_password nats_password minio_root_password grafana_admin_password session_secret session_signing_keys projects_gateway_signing_keys hash_pepper_keys database_url nats_url smtp_password mariadb_root_password phpmyadmin_control_password google_recaptcha_secret_key cloudflare_turnstile_secret_key google_oauth_client_secret alertmanager_webhook_token backup_signing_keys restic_password; do
            printf 'ci-placeholder-%s-00000000000000000000000000000000\n' "$name" > "secrets/$name.txt"
          done
          printf 'dummy-cert\n' > traefik/certs/local-cert.pem
          printf 'dummy-key\n' > traefik/certs/local-key.pem

      - name: Render local WAF compose
        run: |
          cp .env.example .env
          printf '\nPROJECT_SOURCE_DIR=./.tmp/optional-project-source\n' >> .env
          docker network create enterprise_net || true
          docker volume create enterprise_mariadb_data || true
          docker compose --env-file .env -p platform_ops_ci \
            -f compose.yaml \
            -f compose.build.yaml \
            -f compose.secrets.yaml \
            -f compose.waf.yaml \
            config --quiet

      - name: Render VPS WAF compose
        run: |
          docker compose --env-file .env.vps.example -p platform_infra_vps_ci \
            -f compose.yaml \
            -f compose.build.yaml \
            -f compose.secrets.yaml \
            -f compose.vps.yaml \
            -f compose.waf.yaml \
            -f compose.vps-waf.yaml \
            config --quiet

      - name: Render staging and backup compose
        run: |
          docker compose --env-file .env -p platform_infra_staging_ci \
            -f compose.yaml \
            -f compose.build.yaml \
            -f compose.secrets.yaml \
            -f compose.waf.yaml \
            -f compose.staging.yaml \
            config --quiet
          docker compose --env-file .env -p platform_ops_backup_ci \
            -f compose.yaml \
            -f compose.secrets.yaml \
            -f compose.backup-scheduler.yaml \
            config --quiet

      - name: Backup scheduler dry run
        run: |
          docker build -f docker/ops.Dockerfile -t platform/ops:ci .
          docker run --rm \
            -e BACKUP_SCHEDULER_DRY_RUN=true \
            -e PLATFORM_INFRA_HOST_ROOT="${{ github.workspace }}" \
            -e PROJECT_SOURCE_HOST_ROOT="${{ github.workspace }}/.tmp/optional-project-source" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/infra:ro" \
            -v "${{ github.workspace }}/.tmp/optional-project-source:/project:ro" \
            --entrypoint sh \
            platform/ops:ci \
            /infra/scripts/backup-scheduler.sh

      - name: External uptime manifest dry run
        run: sh ./scripts/infra-ops.sh external-uptime-check --dryRun

      - name: Cloudflare Access admin dry run
        run: sh ./scripts/infra-ops.sh cloudflare-access-admin --manifest cloudflare/access-admin.example.json

      - name: Cloudflare from-zero dry run
        run: sh ./scripts/infra-ops.sh cloudflare-from-zero --manifest cloudflare/from-zero.example.json

      - name: GitHub branch protection dry run
        run: sh ./scripts/infra-ops.sh github-branch-protection --repo "${{ github.repository }}" --branch main --dryRun

      - name: GitHub environments dry run
        run: sh ./scripts/infra-ops.sh github-environments --repo "${{ github.repository }}" --dryRun

      - name: GitHub Actions runtime config dry run
        run: sh ./scripts/infra-ops.sh github-actions-config --repo "${{ github.repository }}"

      - name: GitHub Actions run evidence plan
        run: sh ./scripts/infra-ops.sh github-actions-run-evidence --repo "${{ github.repository }}" --workflow enterprise-infra.yml --branch main --sha "${{ github.sha }}"

      - name: Secret scan
        run: sh ./scripts/infra-ops.sh secret-scan

      - name: HA configuration check
        run: sh ./scripts/infra-ops.sh ha-config-check

      - name: Managed secrets preflight
        run: sh ./scripts/infra-ops.sh managed-secrets-preflight

      - name: Compose healthcheck coverage
        run: sh ./scripts/infra-ops.sh compose-healthcheck-coverage

      - name: Rate limit evidence
        run: sh ./scripts/infra-ops.sh rate-limit-evidence

      - name: Audit log evidence
        run: sh ./scripts/infra-ops.sh audit-log-evidence

      - name: Retention evidence
        run: sh ./scripts/infra-ops.sh retention-evidence

      - name: Secret rotation evidence plan
        run: sh ./scripts/infra-ops.sh secret-rotation-evidence

      - name: DR readiness check
        run: sh ./scripts/infra-ops.sh dr-readiness-check

      - name: DR evidence summary
        run: sh ./scripts/infra-ops.sh dr-evidence

      - name: Off-site restore drill plan
        run: sh ./scripts/infra-ops.sh offsite-restore-drill-restic --planOnly

      - name: Release evidence plan
        run: sh ./scripts/infra-ops.sh release-evidence --planOnly

      - name: Release artifact gate dry run
        run: |
          mkdir -p .tmp/ci-sbom
          printf '%s\n' \
            'BACKEND_IMAGE=registry.example/platform/backend:ci@sha256:1111111111111111111111111111111111111111111111111111111111111111' \
            'WEB_IMAGE=registry.example/platform/web:ci@sha256:2222222222222222222222222222222222222222222222222222222222222222' \
            'WORKER_NOTIFICATIONS_IMAGE=registry.example/platform/worker-notifications:ci@sha256:3333333333333333333333333333333333333333333333333333333333333333' \
            'WORKER_JOBS_IMAGE=registry.example/platform/worker-jobs:ci@sha256:4444444444444444444444444444444444444444444444444444444444444444' \
            > .tmp/ci-release.env
          printf '%s\n' '{"bomFormat":"CycloneDX","specVersion":"1.5","components":[]}' > .tmp/ci-sbom/pnpm-sbom-ci.json
          sh ./scripts/infra-ops.sh release-artifact-gate --envFile .tmp/ci-release.env --sbom .tmp/ci-sbom/pnpm-sbom-ci.json

      - name: Alert evidence summary
        run: sh ./scripts/infra-ops.sh alert-evidence

      - name: Production go-no-go summary
        run: sh ./scripts/infra-ops.sh production-go-no-go

      - name: Pre go-live evidence report
        run: sh ./scripts/infra-ops.sh pre-go-live-evidence --infraOnly --repo "${{ github.repository }}" --allowFailures

      - name: Evidence bundle smoke
        run: sh ./scripts/infra-ops.sh evidence-bundle --noArchive

      - name: Evidence bundle integrity verify
        run: sh ./scripts/infra-ops.sh evidence-bundle-verify

      - name: Linux portability check
        run: sh ./scripts/infra-ops.sh linux-portability-check

      - name: Enterprise requirements traceability
        run: sh ./scripts/infra-ops.sh enterprise-requirements-check

      - name: Production readiness checklist
        run: sh ./scripts/infra-ops.sh enterprise-requirements-check --manifest governance/production-readiness.json

      - name: Production live proof gate rejects missing evidence
        run: |
          if sh ./scripts/infra-ops.sh enterprise-requirements-check --manifest governance/production-readiness.json --requireLiveProofs; then
            echo "Live proof gate passed without real production evidence." >&2
            exit 1
          fi

      - name: Repository coverage audit
        run: sh ./scripts/infra-ops.sh repo-coverage-check

      - name: Control Center tests
        run: sh ./scripts/infra-ops.sh control-center-tests

      - name: Project Router tests
        run: sh ./scripts/infra-ops.sh project-router-tests

      - name: Run infrastructure static policy gate
        run: sh ./scripts/infra-ops.sh static-security-check --infraOnly

      - name: Upload CI evidence reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: infra-ci-evidence
          path: |
            reports/
            .tmp/evidence-bundles/
          if-no-files-found: ignore
          retention-days: 30

  shell-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v7
      - name: Check shell scripts parse
        run: |
          for file in scripts/*.sh; do
            sh -n "$file"
          done

  dast-zap:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: ${{ vars.DAST_TARGET }}
    steps:
      - uses: actions/checkout@v7
      - name: Run ZAP baseline against staging
        env:
          DAST_TARGET: ${{ vars.DAST_TARGET }}
        run: |
          test -n "$DAST_TARGET"
          sh ./scripts/dast-zap-baseline.sh "$DAST_TARGET"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-baseline
          path: security/dast/

  deploy-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - compose-and-policy
      - shell-syntax
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
    concurrency:
      group: infra-production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Deploy to VPS
        env:
          DEPLOY_REMOTE: ${{ vars.DEPLOY_REMOTE }}
          DEPLOY_REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_RUN_PRODUCTION_PREFLIGHT: "1"
          DEPLOY_RUN_PRE_GO_LIVE: "1"
          DEPLOY_RUN_GO_NO_GO: "1"
          DEPLOY_PRE_GO_LIVE_PRODUCTION_PREFLIGHT: "1"
          DEPLOY_PRE_GO_LIVE_RESTORE_DRILL: "1"
          DEPLOY_PRE_GO_LIVE_OFFSITE_RESTORE_DRY_RUN: "1"
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new
        run: sh ./scripts/deploy-vps.sh
