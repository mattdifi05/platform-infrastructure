name: enterprise-infra-run-evidence

on:
  workflow_run:
    workflows:
      - enterprise-infra
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  github-actions-run-evidence:
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout verified infrastructure commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify completed enterprise infra run
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sh ./scripts/infra-ops.sh github-actions-run-evidence \
            --repo "${{ github.repository }}" \
            --workflow enterprise-infra.yml \
            --branch "${{ github.event.workflow_run.head_branch }}" \
            --sha "${{ github.event.workflow_run.head_sha }}" \
            --verifyRemote

      - name: Upload GitHub Actions run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-actions-run-evidence
          path: reports/github-actions/
          if-no-files-found: error
          retention-days: 30
