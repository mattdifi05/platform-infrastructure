name: Bug report
description: Report a reproducible infrastructure issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, profile and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, provider profile and relevant Compose files.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I did not include secrets, tokens, dumps or private `.env` values.
          required: true
