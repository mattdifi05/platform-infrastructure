name: Feature request
description: Propose an infrastructure or documentation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Control Center
        - Compose/runtime
        - Security
        - Backup/restore
        - Release evidence
        - Observability
        - Provider integration
        - Documentation
