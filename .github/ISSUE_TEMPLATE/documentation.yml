name: Documentation
description: Report unclear, missing or outdated docs.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page
      description: Which file or page is affected?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested fix
      description: Optional wording or structure suggestion.
