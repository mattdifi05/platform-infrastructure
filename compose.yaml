name: platform_infra_local

x-default-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.7.5@sha256:e4d98158c01ad752fc1071d4e9573788747230d902cdde00a772516e692d07c9}
    container_name: enterprise-traefik
    init: true
    pids_limit: 256
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic/middlewares.yml:/etc/traefik/dynamic/middlewares.yml:ro
      - ./traefik/dynamic/tls-local.yml:/etc/traefik/dynamic/tls-local.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    configs:
      - source: enterprise_traefik_routes
        target: /etc/traefik/dynamic/routes.yml
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa}
    container_name: enterprise-postgres
    init: true
    pids_limit: 1024
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      APP_DB_NAME: ${APP_DB_NAME:-app_db}
      APP_DB_USER: ${APP_DB_USER:-app_user}
      APP_DB_PASSWORD_FILE: /run/secrets/app_db_password
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
    volumes:
      - enterprise_postgres_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:8.6-alpine@sha256:2cc044fc5a07c9b701f8f1255a309ae9ad7856e694ac03513bf3648c01e40763}
    container_name: enterprise-redis
    init: true
    pids_limit: 256
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    command:
      - sh
      - -ec
      - |
        REDIS_PASSWORD="$$(cat "$${REDIS_PASSWORD_FILE}")"
        exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - enterprise_redis_data:/data
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$(cat \"$${REDIS_PASSWORD_FILE}\")\" redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.6.3@sha256:5fdbf2dbb5897cc34e82de49d13e23db011f9925089dbc555fc095f2c8bc1dac}
    container_name: enterprise-keycloak
    init: true
    pids_limit: 1024
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - export KC_BOOTSTRAP_ADMIN_PASSWORD="$$(cat "$${KC_BOOTSTRAP_ADMIN_PASSWORD_FILE}")"; export KC_DB_PASSWORD="$$(cat "$${KC_DB_PASSWORD_FILE}")"; exec /opt/keycloak/bin/kc.sh start --http-port=8080 --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-auth.localhost.com}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-true}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - enterprise_keycloak_data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - enterprise_net
    labels:
      traefik.enable: "true"
      traefik.http.routers.enterprise-keycloak.rule: Host(`${AUTH_HOST:-auth.localhost.com}`)
      traefik.http.routers.enterprise-keycloak.entrypoints: web
      traefik.http.routers.enterprise-keycloak.middlewares: keycloak-security-headers@file,enterprise-compress@file
      traefik.http.services.enterprise-keycloak.loadbalancer.server.port: "8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'true < /dev/tcp/127.0.0.1/8080'"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 60s

  nats:
    image: ${NATS_IMAGE:-nats:2.14-alpine@sha256:952d157e28d5394a211229bd57a7b37ff9f184e58e2c8486a08fa909fd254e32}
    container_name: enterprise-nats
    init: true
    pids_limit: 256
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
      - NATS_PASSWORD="$$(cat "$$NATS_PASSWORD_FILE")"; exec nats-server -c /etc/nats/nats-server.conf --user "$$NATS_USER" --pass "$$NATS_PASSWORD"
    environment:
      NATS_USER: ${NATS_USER:-enterprise}
      NATS_PASSWORD_FILE: /run/secrets/nats_password
    volumes:
      - enterprise_nats_data:/data
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e}
    container_name: enterprise-minio
    init: true
    pids_limit: 512
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - export MINIO_ROOT_PASSWORD="$$(cat "$${MINIO_ROOT_PASSWORD_FILE}")"; exec minio server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://minio.localhost.com}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-https://s3.localhost.com}
    volumes:
      - enterprise_minio_data:/data
    networks:
      - enterprise_net
    labels:
      traefik.enable: "true"
      traefik.http.routers.enterprise-minio.rule: Host(`${MINIO_CONSOLE_HOST:-minio.localhost.com}`)
      traefik.http.routers.enterprise-minio.entrypoints: web
      traefik.http.routers.enterprise-minio.middlewares: enterprise-security-headers@file,enterprise-compress@file
      traefik.http.services.enterprise-minio.loadbalancer.server.port: "9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10

  php-apache:
    image: ${PHP_APACHE_BUILD_IMAGE:-platform/php-apache:local}
    build:
      context: .
      dockerfile: docker/php-apache.Dockerfile
      args:
        PHP_IMAGE: ${PHP_IMAGE:-php:8.5-apache@sha256:c6e17deefe4b7f79fd6a826a3d5f61f28035c3a7c12a1b446bf45f0e07bee9b2}
        COMPOSER_IMAGE: ${COMPOSER_IMAGE:-composer:2.10.1@sha256:7725eb4545c438629ae8bde3ef0bb9a5038ef566126ad878442a69007242d267}
        PHP_EXTENSION_INSTALLER_IMAGE: ${PHP_EXTENSION_INSTALLER_IMAGE:-mlocati/php-extension-installer:2.11.12@sha256:b6d3fa381b9ba5cf051117c1c601d6a523b590e534bf3d56eb4fbe352949c138}
    container_name: php-apache
    init: true
    pids_limit: 512
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    expose:
      - "80"
      - "443"
    environment:
      PROJECTS_GATEWAY_EMAIL: ${PROJECTS_GATEWAY_EMAIL:-admin@example.com}
      PROJECTS_GATEWAY_SIGNING_KEYS_FILE: /run/secrets/projects_gateway_signing_keys
      MAILER_FROM: ${MAILER_FROM:-no-reply@localhost}
      MAILER_REPLY_TO: ${MAILER_REPLY_TO:-no-reply@localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      NODE_PROJECT_HOSTS: ${NODE_PROJECT_HOSTS:-}
      PROJECT_STATE_FILE: /var/www/project-state/projects.json
    secrets:
      - projects_gateway_signing_keys
      - smtp_password
    volumes:
      - ${PHP_SOURCE_DIR:-./php-runtime-root}:/var/www/html
      - .:/var/www/infra-docs:ro
      - ${PHP_PROJECTS_DIR:-../src}:/var/www/projects
      - ${PROJECTS_SYMLINK_TARGET_ROOT:-..}:/mnt/host/d/docker:ro
      - ./projects-portal/state:/var/www/project-state
      - ./php-apache/php/custom.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
      - ./php-apache/apache:/etc/apache2/sites-available
      - ./traefik/certs:/etc/apache2/certs:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "apache2ctl -t >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10

  control-center:
    image: ${NODE_IMAGE:-node:26.3.1-alpine@sha256:a2dc166a387cc6ca1e62d0c8e265e49ca985d6e60abc9fe6e6c3d6ce8e63f606}
    container_name: enterprise-control-center
    init: true
    pids_limit: 512
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    working_dir: /app
    command:
      - node
      - /app/server.mjs
    expose:
      - "8080"
    environment:
      CONTROL_CENTER_PORT: 8080
      CONTROL_CENTER_ENV: ${CONTROL_CENTER_ENV:-local}
      CONTROL_CENTER_AUTH_REQUIRED: ${CONTROL_CENTER_AUTH_REQUIRED:-false}
      CONTROL_CENTER_ADMIN_PASSWORD_SHA256: ${CONTROL_CENTER_ADMIN_PASSWORD_SHA256:-}
      CONTROL_CENTER_SESSION_KEYS_FILE: /run/secrets/projects_gateway_signing_keys
      CONTROL_CENTER_DOCS_ROOT: /var/www/infra-docs
      PROJECTS_ROOT: /var/www/projects
      PROJECT_STATE_FILE: /var/www/project-state/projects.json
      PROJECT_AUDIT_FILE: /var/www/project-state/audit.jsonl
      PROJECT_OPERATIONS_FILE: /var/www/project-state/operations.jsonl
      PROJECT_APPLICATIONS_FILE: /var/www/project-state/applications.json
      PROJECT_DOMAINS_FILE: /var/www/project-state/domains.json
      PROJECT_DATABASES_FILE: /var/www/project-state/databases.json
      PROJECT_STORAGE_BUCKETS_FILE: /var/www/project-state/storage-buckets.json
      PROJECT_SENSITIVE_MATERIALS_FILE: /var/www/project-state/sensitive-materials.json
      PROJECT_WORKER_JOBS_FILE: /var/www/project-state/worker-jobs.json
      PROJECT_DEPLOYMENTS_FILE: /var/www/project-state/deployments.jsonl
      PROJECT_BACKUP_RECORDS_FILE: /var/www/project-state/backups.jsonl
      PROJECT_RESOURCE_LIMITS_FILE: /var/www/project-state/resource-limits.json
      PROJECT_SECURITY_POLICIES_FILE: /var/www/project-state/security-policies.json
      PROJECT_ALERTS_FILE: /var/www/project-state/alerts.json
      PROJECT_NOTIFICATION_CHANNELS_FILE: /var/www/project-state/notification-channels.json
      PROJECT_PROVIDER_CONNECTIONS_FILE: /var/www/project-state/provider-connections.json
      PROJECT_SETTINGS_FILE: /var/www/project-state/settings.json
      PROJECT_WEBSPACES_FILE: /var/www/project-state/webspaces.json
      STEXOR_UI_PACKAGE_ROOT: /app/vendor/@stexor/ui
      CONTROL_CENTER_PUBLIC_ROOT: /app/public
      PROJECTS_HOST: ${PROJECTS_HOST:-projects.localhost.com}
      PROJECT_HOST_SUFFIX: ${PROJECT_HOST_SUFFIX:-.localhost.com}
      NODE_PROJECT_HOSTS: ${NODE_PROJECT_HOSTS:-}
    volumes:
      - ./control-center:/app:ro
      - .:/var/www/infra-docs:ro
      - ${PHP_PROJECTS_DIR:-../src}:/var/www/projects:ro
      - ${PROJECTS_SYMLINK_TARGET_ROOT:-..}:/mnt/host/d/docker:ro
      - ./projects-portal/state:/var/www/project-state
    secrets:
      - projects_gateway_signing_keys
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/__health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  project-router:
    image: ${NODE_IMAGE:-node:26.3.1-alpine@sha256:a2dc166a387cc6ca1e62d0c8e265e49ca985d6e60abc9fe6e6c3d6ce8e63f606}
    container_name: enterprise-project-router
    init: true
    pids_limit: 512
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    working_dir: /app
    command:
      - node
      - /app/server.mjs
    expose:
      - "8080"
    environment:
      PROJECT_ROUTER_PORT: 8080
      PROJECTS_ROOT: /var/www/projects
      PROJECT_STATE_FILE: /var/www/project-state/projects.json
      PROJECTS_HOST: ${PROJECTS_HOST:-projects.localhost.com}
      PROJECT_HOST_SUFFIX: ${PROJECT_HOST_SUFFIX:-.localhost.com}
      PHP_UPSTREAM: http://php-apache:80
      CONTROL_CENTER_UPSTREAM: http://control-center:8080
      NODE_PROJECT_HOSTS: ${NODE_PROJECT_HOSTS:-}
      NODE_PROJECT_UPSTREAMS: ${NODE_PROJECT_UPSTREAMS:-}
      NODE_PROJECT_COMMANDS: ${NODE_PROJECT_COMMANDS:-}
      NODE_PROJECT_ENV: ${NODE_PROJECT_ENV:-development}
    volumes:
      - ./project-router:/app:ro
      - ${PHP_PROJECTS_DIR:-../src}:/var/www/projects
      - ${PROJECTS_SYMLINK_TARGET_ROOT:-..}:/mnt/host/d/docker
      - ./projects-portal/state:/var/www/project-state
    depends_on:
      php-apache:
        condition: service_healthy
      control-center:
        condition: service_healthy
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/__health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  mariadb:
    image: ${MARIADB_IMAGE:-mariadb:12.3.2@sha256:b1c7bf836e64ed9406a8984af29509f40089d55cea14b32f12c4726a1f17104b}
    container_name: mariadb
    init: true
    pids_limit: 1024
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${LOCAL_MARIADB_ROOT_PASSWORD:-root}
    volumes:
      - enterprise_mariadb_data:/var/lib/mysql
      - ./mariadb/initdb:/docker-entrypoint-initdb.d:ro
      - ./mariadb/conf.d:/etc/mysql/conf.d:ro
      - ./traefik/certs:/etc/mysql/ssl:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "mariadb -uroot -p\"$${MARIADB_ROOT_PASSWORD}\" -N -e 'select 1' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30

  phpmyadmin:
    image: ${PHPMYADMIN_IMAGE:-phpmyadmin:5.2.3@sha256:b16dc88d6e62b186dc4864adac4996fe0238587aa9f5ed507dcfc3894903a3f6}
    container_name: phpmyadmin
    profiles:
      - admin
    init: true
    pids_limit: 512
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_SSL_CA: /etc/phpmyadmin/certs/ca.pem
      PMA_SSL_VERIFIES: "1"
      UPLOAD_LIMIT: 256M
    volumes:
      - ./phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
      - ./traefik/certs:/etc/phpmyadmin/certs:ro
    depends_on:
      mariadb:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - enterprise_net

  backend:
    image: ${BACKEND_BUILD_IMAGE:-platform/backend:local}
    container_name: enterprise-backend
    init: true
    pids_limit: 512
    logging: *default_logging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000
      SERVICE_NAME: enterprise-backend
      SESSION_SECRET_FILE: /run/secrets/session_secret
      SESSION_SIGNING_KEYS_FILE: /run/secrets/session_signing_keys
      SECRET_HASH_KEYS_FILE: /run/secrets/hash_pepper_keys
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-app_session}
      SESSION_COOKIE_MAX_AGE_SECONDS: ${SESSION_COOKIE_MAX_AGE_SECONDS:-315360000}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-false}
      APP_DB_NAME: ${APP_DB_NAME:-app_db}
      APP_DB_USER: ${APP_DB_USER:-app_user}
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-platform}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-enterprise}
      NATS_URL_FILE: /run/secrets/nats_url
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-local-bucket}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api.localhost.com}
      ACCOUNT_PUBLIC_URL: ${ACCOUNT_PUBLIC_URL:-https://account.localhost.com}
      UI_PUBLIC_URL: ${UI_PUBLIC_URL:-https://ui.localhost.com}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-account.localhost.com}
      WEBAUTHN_ORIGINS: ${WEBAUTHN_ORIGINS:-https://account.localhost.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://account.localhost.com,https://ui.localhost.com}
      BOT_PROTECTION_PROVIDER: ${BOT_PROTECTION_PROVIDER:-disabled}
      BOT_PROTECTION_REQUIRED: ${BOT_PROTECTION_REQUIRED:-}
      BOT_PROTECTION_MIN_SCORE: ${BOT_PROTECTION_MIN_SCORE:-0.5}
      BOT_PROTECTION_EXPECTED_HOSTNAMES: ${BOT_PROTECTION_EXPECTED_HOSTNAMES:-account.localhost.com,ui.localhost.com}
      GOOGLE_RECAPTCHA_SECRET_KEY_FILE: /run/secrets/google_recaptcha_secret_key
      CLOUDFLARE_TURNSTILE_SECRET_KEY_FILE: /run/secrets/cloudflare_turnstile_secret_key
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET_FILE: ${GOOGLE_OAUTH_CLIENT_SECRET_FILE-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-https://api.localhost.com/auth/google/callback}
      GOOGLE_OAUTH_SCOPES: ${GOOGLE_OAUTH_SCOPES:-openid email profile https://www.googleapis.com/auth/user.birthday.read}
      RATE_LIMIT_TTL_SECONDS: ${RATE_LIMIT_TTL_SECONDS:-60}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      RATE_LIMIT_FALLBACK_MAX_REQUESTS: ${RATE_LIMIT_FALLBACK_MAX_REQUESTS:-80}
      SENSITIVE_ACTION_RATE_LIMIT_MAX: ${SENSITIVE_ACTION_RATE_LIMIT_MAX:-40}
      SENSITIVE_ACTION_FALLBACK_RATE_LIMIT_MAX: ${SENSITIVE_ACTION_FALLBACK_RATE_LIMIT_MAX:-10}
      SESSION_TOUCH_THROTTLE_SECONDS: ${SESSION_TOUCH_THROTTLE_SECONDS:-60}
      PASSKEY_CHALLENGE_TTL_SECONDS: ${PASSKEY_CHALLENGE_TTL_SECONDS:-300}
      OTP_SEND_COOLDOWN_SECONDS: ${OTP_SEND_COOLDOWN_SECONDS:-60}
      AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-true}
      STRUCTURED_LOGGING: ${STRUCTURED_LOGGING:-true}
      MAILER_PROVIDER: ${MAILER_PROVIDER:-smtp}
      MAILER_FROM: ${MAILER_FROM:?Set MAILER_FROM}
      MAILER_REPLY_TO: ${MAILER_REPLY_TO:?Set MAILER_REPLY_TO}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      MAILER_CREDENTIALS_MANAGED_EXTERNALLY: ${MAILER_CREDENTIALS_MANAGED_EXTERNALLY:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - enterprise_net
    labels:
      traefik.enable: "true"
      traefik.http.routers.enterprise-backend.rule: Host(`${API_HOST:-api.localhost.com}`)
      traefik.http.routers.enterprise-backend.entrypoints: web
      traefik.http.routers.enterprise-backend.middlewares: enterprise-security-headers@file,enterprise-rate-limit@file,enterprise-compress@file
      traefik.http.services.enterprise-backend.loadbalancer.server.port: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    image: ${WEB_BUILD_IMAGE:-platform/web:local}
    container_name: enterprise-web
    init: true
    pids_limit: 512
    logging: *default_logging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.localhost.com}
      NEXT_PUBLIC_UI_URL: ${NEXT_PUBLIC_UI_URL:-https://ui.localhost.com}
      NEXT_PUBLIC_ACCOUNT_URL: ${NEXT_PUBLIC_ACCOUNT_URL:-https://account.localhost.com}
      NEXT_PUBLIC_BOT_PROTECTION_PROVIDER: ${NEXT_PUBLIC_BOT_PROTECTION_PROVIDER:-disabled}
      NEXT_PUBLIC_GOOGLE_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_GOOGLE_RECAPTCHA_SITE_KEY:-}
      NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY:-}
      INTERNAL_API_URL: http://backend:3000
      ACCOUNT_HOST: ${ACCOUNT_HOST:-account.localhost.com}
      ACCOUNT_PUBLIC_URL: ${ACCOUNT_PUBLIC_URL:-https://account.localhost.com}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://account.localhost.com}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.localhost.com/realms/platform}
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - enterprise_net
    labels:
      traefik.enable: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker-notifications:
    image: ${WORKER_NOTIFICATIONS_BUILD_IMAGE:-platform/worker-notifications:local}
    container_name: enterprise-worker-notifications
    init: true
    pids_limit: 512
    logging: *default_logging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      WORKER_NAME: enterprise-worker-notifications
      ALERTMANAGER_WEBHOOK_TOKEN_FILE: /run/secrets/alertmanager_webhook_token
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-platform}
      NATS_URL_FILE: /run/secrets/nats_url
      ALERT_FORWARD_WEBHOOK_URL: ${ALERT_FORWARD_WEBHOOK_URL:-}
      ALERT_DISCORD_WEBHOOK_URL_FILE: ${ALERT_DISCORD_WEBHOOK_URL_FILE:-}
      ALERT_TELEGRAM_BOT_TOKEN_FILE: ${ALERT_TELEGRAM_BOT_TOKEN_FILE:-}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:-}
      ALERT_TELEGRAM_API_BASE_URL: ${ALERT_TELEGRAM_API_BASE_URL:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-admin@example.com}
      MAILER_FROM: ${MAILER_FROM:?Set MAILER_FROM}
      MAILER_REPLY_TO: ${MAILER_REPLY_TO:?Set MAILER_REPLY_TO}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      STRUCTURED_LOGGING: ${STRUCTURED_LOGGING:-true}
      AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker-jobs:
    image: ${WORKER_JOBS_BUILD_IMAGE:-platform/worker-jobs:local}
    container_name: enterprise-worker-jobs
    init: true
    pids_limit: 512
    logging: *default_logging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      WORKER_NAME: enterprise-worker-jobs
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-platform}
      NATS_URL_FILE: /run/secrets/nats_url
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      STRUCTURED_LOGGING: ${STRUCTURED_LOGGING:-true}
      AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-true}
      AUDIT_OUTBOX_ENABLED: ${AUDIT_OUTBOX_ENABLED:-true}
      AUDIT_OUTBOX_BATCH_SIZE: ${AUDIT_OUTBOX_BATCH_SIZE:-25}
      AUDIT_OUTBOX_INTERVAL_MS: ${AUDIT_OUTBOX_INTERVAL_MS:-5000}
      AUDIT_OUTBOX_MAX_ATTEMPTS: ${AUDIT_OUTBOX_MAX_ATTEMPTS:-8}
      AUDIT_OUTBOX_LEASE_MS: ${AUDIT_OUTBOX_LEASE_MS:-60000}
      AUDIT_OUTBOX_INITIAL_BACKOFF_MS: ${AUDIT_OUTBOX_INITIAL_BACKOFF_MS:-5000}
      AUDIT_OUTBOX_BACKOFF_MULTIPLIER: ${AUDIT_OUTBOX_BACKOFF_MULTIPLIER:-2}
      AUDIT_OUTBOX_MAX_BACKOFF_MS: ${AUDIT_OUTBOX_MAX_BACKOFF_MS:-300000}
      AUDIT_OUTBOX_NATS_SUBJECT_PREFIX: ${AUDIT_OUTBOX_NATS_SUBJECT_PREFIX:-audit.events}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac}
    container_name: enterprise-prometheus
    init: true
    pids_limit: 512
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --web.enable-lifecycle
    depends_on:
      alertmanager:
        condition: service_healthy
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
      node-exporter:
        condition: service_healthy
      cadvisor:
        condition: service_healthy
    volumes:
      - enterprise_prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.10.2@sha256:3ac34ce007accad95afed72149e0d2b927b7e42fd1c866149b945b84737c62c3}
    container_name: enterprise-node-exporter
    init: true
    pids_limit: 128
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|run/docker/netns)($|/)
      - --collector.netclass.ignored-devices=^(veth.*|br-.*|docker.*)$
    pid: host
    volumes:
      - /:/host:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9100/metrics"]
      interval: 20s
      timeout: 5s
      retries: 10

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.52.1@sha256:f40e65878e25c2e78ea037f73a449527a0fb994e303dc3e34cb6b187b4b91435}
    container_name: enterprise-cadvisor
    init: true
    pids_limit: 256
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command:
      - --docker_only=true
      - --store_container_labels=false
      - --housekeeping_interval=30s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 10

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:v0.32.2@sha256:b85533a2eb45865835315810315f6951331b2dbc8c93a6cf9a51e156a006a706}
    container_name: enterprise-alertmanager
    init: true
    pids_limit: 256
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    depends_on:
      worker-notifications:
        condition: service_healthy
    volumes:
      - enterprise_alertmanager_data:/alertmanager
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2}
    container_name: enterprise-grafana
    init: true
    pids_limit: 512
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.localhost.com}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    volumes:
      - enterprise_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - enterprise_net
    labels:
      traefik.enable: "true"
      traefik.http.routers.enterprise-grafana.rule: Host(`${GRAFANA_HOST:-grafana.localhost.com}`)
      traefik.http.routers.enterprise-grafana.entrypoints: web
      traefik.http.routers.enterprise-grafana.middlewares: enterprise-security-headers@file,enterprise-compress@file
      traefik.http.services.enterprise-grafana.loadbalancer.server.port: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86}
    container_name: enterprise-loki
    init: true
    pids_limit: 512
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    depends_on:
      alertmanager:
        condition: service_healthy
    volumes:
      - enterprise_loki_data:/loki
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - ./loki/rules:/loki/rules:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 15s
      timeout: 5s
      retries: 15

  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.6.10@sha256:2a0f5e3e160ee5d549c585f6cc4f4e1c566ff783324a424bd75bc16503fc660e}
    container_name: enterprise-promtail
    init: true
    pids_limit: 256
    logging: *default_logging
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD", "/usr/bin/promtail", "-version"]
      interval: 20s
      timeout: 5s
      retries: 10

networks:
  enterprise_net:
    external: true
    name: enterprise_net

volumes:
  enterprise_mariadb_data:
    name: ${MARIADB_DATA_VOLUME:-enterprise_mariadb_data}
    external: true
  enterprise_postgres_data:
    name: enterprise_postgres_data
  enterprise_redis_data:
    name: enterprise_redis_data
  enterprise_keycloak_data:
    name: enterprise_keycloak_data
  enterprise_nats_data:
    name: enterprise_nats_data
  enterprise_minio_data:
    name: enterprise_minio_data
  enterprise_alertmanager_data:
    name: enterprise_alertmanager_data
  enterprise_grafana_data:
    name: enterprise_grafana_data
  enterprise_prometheus_data:
    name: enterprise_prometheus_data
  enterprise_loki_data:
    name: enterprise_loki_data

configs:
  enterprise_traefik_routes:
    content: |
      http:
        routers:
          enterprise-web-http:
            rule: Host(`${UI_HOST:-ui.localhost.com}`)
            entryPoints:
              - web
            middlewares:
              - enterprise-redirect-https@file
            service: enterprise-web

          enterprise-web:
            rule: Host(`${UI_HOST:-ui.localhost.com}`)
            entryPoints:
              - websecure
            tls: {}
            middlewares:
              - enterprise-security-headers@file
              - enterprise-compress@file
            service: enterprise-web

          enterprise-account-http:
            rule: Host(`${ACCOUNT_HOST:-account.localhost.com}`)
            entryPoints:
              - web
            middlewares:
              - enterprise-redirect-https@file
            service: enterprise-web

          enterprise-account:
            rule: Host(`${ACCOUNT_HOST:-account.localhost.com}`)
            entryPoints:
              - websecure
            tls: {}
            middlewares:
              - enterprise-security-headers@file
              - enterprise-compress@file
            service: enterprise-web

          enterprise-backend-http:
            rule: Host(`${API_HOST:-api.localhost.com}`)
            entryPoints:
              - web
            middlewares:
              - enterprise-redirect-https@file
            service: enterprise-backend

          enterprise-backend:
            rule: Host(`${API_HOST:-api.localhost.com}`)
            entryPoints:
              - websecure
            tls: {}
            middlewares:
              - enterprise-security-headers@file
              - enterprise-rate-limit@file
              - enterprise-compress@file
            service: enterprise-backend

          enterprise-backend-preflight:
            rule: Host(`${API_HOST:-api.localhost.com}`) && Method(`OPTIONS`)
            entryPoints:
              - websecure
            tls: {}
            priority: 100
            middlewares:
              - enterprise-security-headers@file
              - enterprise-compress@file
            service: enterprise-backend

          enterprise-keycloak-http:
            rule: Host(`${AUTH_HOST:-auth.localhost.com}`)
            entryPoints:
              - web
            middlewares:
              - enterprise-redirect-https@file
            service: enterprise-keycloak

          enterprise-keycloak:
            rule: Host(`${AUTH_HOST:-auth.localhost.com}`)
            entryPoints:
              - websecure
            tls: {}
            middlewares:
              - keycloak-security-headers@file
              - enterprise-compress@file
            service: enterprise-keycloak

          enterprise-minio-http:
            rule: Host(`${MINIO_CONSOLE_HOST:-minio.localhost.com}`)
            entryPoints:
              - web
            middlewares:
              - enterprise-redirect-https@file
            service: enterprise-minio

          enterprise-minio:
            rule: Host(`${MINIO_CONSOLE_HOST:-minio.localhost.com}`)
            entryPoints:
              - websecure
            tls: {}
            middlewares:
              - enterprise-security-headers@file
              - enterprise-compress@file
            service: enterprise-minio

          enterprise-grafana-http:
            rule: Host(`${GRAFANA_HOST:-grafana.localhost.com}`)
            entryPoints:
              - web
            middlewares:
              - enterprise-redirect-https@file
            service: enterprise-grafana

          enterprise-grafana:
            rule: Host(`${GRAFANA_HOST:-grafana.localhost.com}`)
            entryPoints:
              - websecure
            tls: {}
            middlewares:
              - enterprise-security-headers@file
              - enterprise-compress@file
            service: enterprise-grafana

          enterprise-phpmyadmin-http:
            rule: Host(`${PHPMYADMIN_HOST:-phpmyadmin.localhost.com}`)
            entryPoints:
              - web
            middlewares:
              - enterprise-redirect-https@file
            service: enterprise-phpmyadmin

          enterprise-phpmyadmin:
            rule: Host(`${PHPMYADMIN_HOST:-phpmyadmin.localhost.com}`)
            entryPoints:
              - websecure
            tls: {}
            middlewares:
              - enterprise-security-headers@file
              - enterprise-compress@file
            service: enterprise-phpmyadmin

          enterprise-minio-api-http:
            rule: Host(`s3.localhost.com`)
            entryPoints:
              - web
            middlewares:
              - enterprise-redirect-https@file
            service: enterprise-minio-api

          enterprise-minio-api:
            rule: Host(`s3.localhost.com`)
            entryPoints:
              - websecure
            tls: {}
            middlewares:
              - enterprise-security-headers@file
              - enterprise-compress@file
            service: enterprise-minio-api

          local-projects-http:
            rule: Host(`${PROJECTS_HOST:-projects.localhost.com}`) || HostRegexp(`${PROJECTS_WILDCARD_HOST_REGEXP:-[a-z0-9-]+\.localhost\.com}`)
            entryPoints:
              - web
            priority: 1
            middlewares:
              - enterprise-redirect-https@file
            service: local-projects

          local-projects:
            rule: Host(`${PROJECTS_HOST:-projects.localhost.com}`) || HostRegexp(`${PROJECTS_WILDCARD_HOST_REGEXP:-[a-z0-9-]+\.localhost\.com}`)
            entryPoints:
              - websecure
            priority: 1
            tls: {}
            middlewares:
              - enterprise-security-headers@file
              - enterprise-compress@file
            service: local-projects

        services:
          enterprise-web:
            loadBalancer:
              servers:
                - url: http://web:3000
          enterprise-backend:
            loadBalancer:
              servers:
                - url: http://backend:3000
          enterprise-keycloak:
            loadBalancer:
              servers:
                - url: http://keycloak:8080
          enterprise-minio:
            loadBalancer:
              servers:
                - url: http://minio:9001
          enterprise-minio-api:
            loadBalancer:
              servers:
                - url: http://minio:9000
          enterprise-grafana:
            loadBalancer:
              servers:
                - url: http://grafana:3000
          enterprise-phpmyadmin:
            loadBalancer:
              servers:
                - url: http://phpmyadmin:80
          local-projects:
            loadBalancer:
              servers:
                - url: http://project-router:8080

secrets:
  projects_gateway_signing_keys:
    file: ${PROJECTS_GATEWAY_SIGNING_KEYS_SECRET_FILE:-./secrets/projects_gateway_signing_keys.txt}
  smtp_password:
    file: ${SMTP_PASSWORD_SECRET_FILE:-./secrets/smtp_password.txt}
