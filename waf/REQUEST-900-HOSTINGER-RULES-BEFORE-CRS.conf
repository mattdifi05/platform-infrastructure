# VPS/Hostinger WAF policy loaded before OWASP CRS.
# Admin surfaces stay private on public deployments even if a container is
# accidentally started.

SecRule REQUEST_URI "@rx (?i)/(?:\.env|\.git|\.svn|\.hg|composer\.(?:json|lock)|package(?:-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|docker-compose\.ya?ml|compose\.ya?ml|\.DS_Store)(?:$|[/?#])" \
    "id:1000101,phase:1,deny,status:403,log,msg:'Blocked sensitive file probe before application routing',tag:'stexor-waf/sensitive-file'"

SecRule REQUEST_HEADERS:Host "@rx (?i)(?:^|\.)(?:phpmyadmin|traefik|prometheus|alertmanager|grafana|minio|s3)\." \
    "id:1000102,phase:1,deny,status:404,log,msg:'Blocked public admin host at WAF edge',tag:'stexor-waf/admin-surface'"

SecRule REQUEST_URI "@rx (?i)(?:/wp-admin|/wp-login\.php|/xmlrpc\.php|/phpinfo\.php|/server-status)(?:$|[/?#])" \
    "id:1000103,phase:1,deny,status:403,log,msg:'Blocked common scanner path',tag:'stexor-waf/scanner-path'"
