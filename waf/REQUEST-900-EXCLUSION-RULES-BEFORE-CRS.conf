# Local platform WAF policy loaded before OWASP CRS.
# Keep this file small: broad protection belongs to CRS, app-specific tuning
# belongs here after reviewing audit logs.

SecRule REQUEST_URI "@rx (?i)/(?:\.env|\.git|\.svn|\.hg|composer\.(?:json|lock)|package(?:-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|docker-compose\.ya?ml|compose\.ya?ml|\.DS_Store)(?:$|[/?#])" \
    "id:1000001,phase:1,deny,status:403,log,msg:'Blocked sensitive file probe before application routing',tag:'platform-waf/sensitive-file'"

SecRule REQUEST_HEADERS:Host "@rx (?i)(?:^|\.)phpmyadmin\.(?!localhost\.com(?::\d+)?$)" \
    "id:1000002,phase:1,deny,status:404,log,msg:'Blocked public phpMyAdmin host at WAF edge',tag:'platform-waf/admin-surface'"

SecRule REQUEST_HEADERS:Host "@rx (?i)^phpmyadmin\.localhost\.com(?::\d+)?$" \
    "id:1000004,phase:1,pass,nolog,ctl:ruleRemoveTargetById=942120;ARGS:aPath,ctl:ruleRemoveTargetById=942120;ARGS:vPath,msg:'Allow phpMyAdmin navigation base64 paths on local admin host',tag:'platform-waf/phpmyadmin-local-tuning'"

SecRule REQUEST_HEADERS:Host "@rx (?i)^(?:traefik|prometheus|alertmanager)\.localhost\.com(?::\d+)?$" \
    "id:1000005,phase:1,deny,status:404,log,msg:'Blocked unauthenticated internal console host at local WAF edge',tag:'platform-waf/admin-surface'"

SecRule REQUEST_URI "@rx (?i)(?:/wp-admin|/wp-login\.php|/xmlrpc\.php|/phpinfo\.php|/server-status)(?:$|[/?#])" \
    "id:1000003,phase:1,deny,status:403,log,msg:'Blocked common scanner path',tag:'platform-waf/scanner-path'"
