# WAF edge overlay for local production-like runs.
# Place this file last in the compose command so the WAF owns host ports and
# Traefik stays internal on the Docker network.

services:
  traefik:
    ports: !override []

  waf:
    image: ${WAF_IMAGE:-owasp/modsecurity-crs:4.26.0-nginx-202605200705@sha256:468c265e9b458f73f58c6c83fd0678724e383c088a0da86d828641c5f64001ed}
    container_name: enterprise-waf
    init: true
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    ports:
      - "${WAF_HTTP_BIND:-127.0.0.1:80}:8080"
      - "${WAF_HTTPS_BIND:-127.0.0.1:443}:8443"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1 && { curl -ksS -o /dev/null http://127.0.0.1:8080/; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 22 ]; }"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    environment:
      BACKEND: ${WAF_BACKEND:-https://traefik:443}
      SERVER_NAME: ${WAF_SERVER_NAME:-localhost}
      PORT: "8080"
      SSL_PORT: "8443"
      SSL_CERT_FILE: /etc/nginx/conf/server.crt
      SSL_CERT_KEY_FILE: /etc/nginx/conf/server.key
      NGINX_ALWAYS_TLS_REDIRECT: ${WAF_NGINX_ALWAYS_TLS_REDIRECT:-on}
      NGINX_PORT_IN_REDIRECT: "off"
      PROXY_SSL_VERIFY: ${WAF_PROXY_SSL_VERIFY:-off}
      PROXY_TIMEOUT: ${WAF_PROXY_TIMEOUT:-60s}
      SERVER_TOKENS: "off"
      LOGLEVEL: ${WAF_LOGLEVEL:-warn}
      ACCESSLOG: /dev/stdout
      ERRORLOG: /dev/stderr
      MODSEC_RULE_ENGINE: ${WAF_MODSEC_RULE_ENGINE:-On}
      MODSEC_AUDIT_ENGINE: ${WAF_MODSEC_AUDIT_ENGINE:-RelevantOnly}
      MODSEC_AUDIT_LOG: /dev/stdout
      MODSEC_AUDIT_LOG_FORMAT: JSON
      MODSEC_AUDIT_LOG_PARTS: ${WAF_MODSEC_AUDIT_LOG_PARTS:-ABIJFHZ}
      MODSEC_REQ_BODY_ACCESS: "On"
      MODSEC_REQ_BODY_LIMIT: ${WAF_MODSEC_REQ_BODY_LIMIT:-13107200}
      MODSEC_REQ_BODY_NOFILES_LIMIT: ${WAF_MODSEC_REQ_BODY_NOFILES_LIMIT:-262144}
      MODSEC_REQ_BODY_JSON_DEPTH_LIMIT: ${WAF_MODSEC_REQ_BODY_JSON_DEPTH_LIMIT:-128}
      MODSEC_RESP_BODY_ACCESS: ${WAF_MODSEC_RESP_BODY_ACCESS:-Off}
      BLOCKING_PARANOIA: ${WAF_BLOCKING_PARANOIA:-2}
      DETECTION_PARANOIA: ${WAF_DETECTION_PARANOIA:-2}
      ANOMALY_INBOUND: ${WAF_ANOMALY_INBOUND:-5}
      ANOMALY_OUTBOUND: ${WAF_ANOMALY_OUTBOUND:-4}
      REPORTING_LEVEL: ${WAF_REPORTING_LEVEL:-4}
      ALLOWED_METHODS: ${WAF_ALLOWED_METHODS:-GET HEAD POST OPTIONS PUT PATCH DELETE}
      ALLOWED_HTTP_VERSIONS: ${WAF_ALLOWED_HTTP_VERSIONS:-HTTP/1.1 HTTP/2 HTTP/2.0}
      RESTRICTED_EXTENSIONS: ${WAF_RESTRICTED_EXTENSIONS:-.asa/ .asax/ .ascx/ .backup/ .bak/ .bat/ .cdx/ .cer/ .cfg/ .cmd/ .com/ .config/ .conf/ .cs/ .csproj/ .dat/ .db/ .dll/ .dos/ .htr/ .htw/ .ida/ .idc/ .idq/ .inc/ .ini/ .key/ .licx/ .log/ .old/ .pass/ .pdb/ .pol/ .printer/ .pwd/ .resources/ .resx/ .sql/ .swp/ .sys/ .vb/ .vbs/ .vbproj/ .vsdisco/ .webinfo/}
      RESTRICTED_HEADERS: ${WAF_RESTRICTED_HEADERS:-/proxy/ /if/ /lock-token/ /content-range/ /translate/ /via/}
      MAX_NUM_ARGS: ${WAF_MAX_NUM_ARGS:-256}
      ARG_NAME_LENGTH: ${WAF_ARG_NAME_LENGTH:-100}
      ARG_LENGTH: ${WAF_ARG_LENGTH:-4096}
      TOTAL_ARG_LENGTH: ${WAF_TOTAL_ARG_LENGTH:-32768}
      MAX_FILE_SIZE: ${WAF_MAX_FILE_SIZE:-10485760}
      COMBINED_FILE_SIZES: ${WAF_COMBINED_FILE_SIZES:-26214400}
      MODSEC_PCRE_MATCH_LIMIT: ${WAF_MODSEC_PCRE_MATCH_LIMIT:-10000}
      MODSEC_PCRE_MATCH_LIMIT_RECURSION: ${WAF_MODSEC_PCRE_MATCH_LIMIT_RECURSION:-10000}
      VALIDATE_UTF8_ENCODING: "1"
      ENFORCE_BODYPROC_URLENCODED: "1"
    volumes:
      - ./waf/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ./waf/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro
      - ./traefik/certs/local-cert.pem:/etc/nginx/conf/server.crt:ro
      - ./traefik/certs/local-key.pem:/etc/nginx/conf/server.key:ro
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - enterprise_net
