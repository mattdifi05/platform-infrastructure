global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets:
          - traefik:8080

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets:
          - keycloak:9000

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:3000

  - job_name: web
    metrics_path: /metrics
    static_configs:
      - targets:
          - web:3000

  - job_name: workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker-notifications:3000
          - worker-jobs:3000
