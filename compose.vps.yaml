# Single-VPS, prod-like overlay for VPS or another edge that terminates TLS.
# Public HTTPS stays at the provider/CDN; Traefik receives HTTP on port 80 and
# forwards X-Forwarded-Proto=https to application containers.

services:
  traefik:
    restart: always
    command: !override
      - --configFile=/etc/traefik/traefik.edge-http.yml
    ports: !override
      - "${TRAEFIK_HTTP_BIND:-80}:80"
    volumes: !override
      - ./traefik/traefik.edge-http.yml:/etc/traefik/traefik.edge-http.yml:ro
      - ./traefik/dynamic/middlewares.yml:/etc/traefik/dynamic/middlewares.yml:ro

  postgres:
    restart: always
    ports: !reset []

  redis:
    restart: always
    ports: !reset []

  keycloak:
    restart: always
    ports: !reset []
    labels: !reset []
    environment:
      KC_HOSTNAME: ${AUTH_HOST:-keycloak.local}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded

  nats:
    restart: always
    ports: !reset []

  minio:
    restart: always
    ports: !reset []
    labels: !reset []

  mariadb:
    restart: always
    ports: !reset []
    environment: !override
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
    secrets:
      - mariadb_root_password
    healthcheck:
      test: ["CMD-SHELL", "mariadb -uroot -p\"$$(cat /run/secrets/mariadb_root_password)\" -N -e 'select 1' >/dev/null"]

  php-apache:
    restart: always
    depends_on: !override
      mariadb:
        condition: service_healthy

  project-router:
    restart: always

  control-center:
    restart: always

  phpmyadmin:
    profiles:
      - admin
    restart: "no"
    labels: !reset []

  backend:
    restart: always
    ports: !reset []
    labels: !reset []
    environment:
      NODE_ENV: production
      SESSION_COOKIE_SECURE: "true"
      API_DOCS_ENABLED: "false"
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://backend:3000}
      ACCOUNT_PUBLIC_URL: ${ACCOUNT_PUBLIC_URL:-${CONTROL_CENTER_PUBLIC_URL:-http://control-center:8080}}
      UI_PUBLIC_URL: ${UI_PUBLIC_URL:-${CONTROL_CENTER_PUBLIC_URL:-http://control-center:8080}}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-${CONTROL_CENTER_HOST:-admin.${DOMAIN:?Set DOMAIN}}}
      WEBAUTHN_ORIGINS: ${WEBAUTHN_ORIGINS:-${CONTROL_CENTER_PUBLIC_URL:-http://control-center:8080}}
      CORS_ORIGINS: ${CORS_ORIGINS:-${CONTROL_CENTER_PUBLIC_URL:-http://control-center:8080}}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://backend:3000/auth/google/callback}
      MAILER_FROM: ${MAILER_FROM:?Set MAILER_FROM}
      MAILER_REPLY_TO: ${MAILER_REPLY_TO:?Set MAILER_REPLY_TO}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER}

  web:
    restart: always
    ports: !reset []
    labels: !reset []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000}
      NEXT_PUBLIC_UI_URL: ${NEXT_PUBLIC_UI_URL:-${CONTROL_CENTER_PUBLIC_URL:-http://control-center:8080}}
      NEXT_PUBLIC_ACCOUNT_URL: ${NEXT_PUBLIC_ACCOUNT_URL:-${CONTROL_CENTER_PUBLIC_URL:-http://control-center:8080}}
      ACCOUNT_HOST: ${ACCOUNT_HOST:-account.local}
      ACCOUNT_PUBLIC_URL: ${ACCOUNT_PUBLIC_URL:-${CONTROL_CENTER_PUBLIC_URL:-http://control-center:8080}}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-${CONTROL_CENTER_PUBLIC_URL:-http://control-center:8080}}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://keycloak:8080/realms/platform}

  worker-notifications:
    restart: always
    ports: !reset []

  worker-jobs:
    restart: always
    ports: !reset []

  prometheus:
    restart: always
    ports: !reset []

  alertmanager:
    restart: always
    ports: !reset []

  grafana:
    restart: always
    ports: !reset []
    labels: !reset []

  loki:
    restart: always
    ports: !reset []

  promtail:
    restart: always

configs:
  enterprise_traefik_routes:
    content: |
      http:
        routers:
          enterprise-admin:
            rule: Host(`${CONTROL_CENTER_HOST:-${ADMIN_HOST:-admin.${DOMAIN:?Set DOMAIN}}}`)
            entryPoints:
              - web
            priority: 100
            middlewares:
              - enterprise-edge-forwarded-https@file
              - enterprise-security-headers@file
              - enterprise-rate-limit@file
              - enterprise-compress@file
            service: enterprise-admin

          enterprise-docs:
            rule: Host(`${DOCS_HOST:-docs.${DOMAIN:?Set DOMAIN}}`)
            entryPoints:
              - web
            priority: 100
            middlewares:
              - enterprise-edge-forwarded-https@file
              - enterprise-security-headers@file
              - enterprise-rate-limit@file
              - enterprise-compress@file
            service: enterprise-docs

        services:
          enterprise-admin:
            loadBalancer:
              servers:
                - url: http://control-center:8080
          enterprise-docs:
            loadBalancer:
              servers:
                - url: http://control-center:8080

secrets:
  mariadb_root_password:
    file: ${MARIADB_ROOT_PASSWORD_SECRET_FILE:-./secrets/mariadb_root_password.txt}
